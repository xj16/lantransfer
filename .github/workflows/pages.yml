name: Deploy web demo to Pages

# Publishes the standalone web client to GitHub Pages, giving the project a
# real, clickable "open two tabs and send a file" demo. The bundle is fully
# static (relative asset paths) and the demo runs with no backend at all.
#
# This is MANUAL (workflow_dispatch) on purpose: GitHub Pages must be enabled
# once for the repo (Settings → Pages → Source: GitHub Actions), after which a
# single "Run workflow" click publishes the demo. Keeping it off the push
# trigger means it never reds the commit status before Pages is set up.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build static bundle
        run: npm run build
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
