name: lantransfer_mobile
description: LanTransfer mobile client — encrypted P2P file sharing across any OS.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # WebRTC data channels for the direct, cloud-free peer connection.
  flutter_webrtc: ^0.11.7
  # WebSocket client for the signaling relay.
  web_socket_channel: ^3.0.1
  # Native file picker for choosing files to send.
  file_picker: ^8.1.4
  # Path helpers for saving received files.
  path_provider: ^2.1.5
  # Pure-Dart ECDH (P-256) + AES-GCM for the end-to-end encryption.
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
